name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 openpyxl ortools pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller schedule.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NurseScheduler-Windows
          path: dist/NurseScheduler/
          retention-days: 30

      - name: Create ZIP for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist/NurseScheduler/* -DestinationPath NurseScheduler-Windows.zip
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NurseScheduler-Windows.zip
          generate_release_notes: true
